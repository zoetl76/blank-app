# Modèle de secrets Streamlit.
# LOCAL : copie ce fichier en  .streamlit/secrets.toml  (à la racine du projet).
# STREAMLIT CLOUD : colle ce contenu dans Settings -> Secrets de l'app.
# NE JAMAIS committer/uploader le fichier rempli.

ANTHROPIC_API_KEY = "sk-ant-xxxxxxxxxxxxxxxxxxxxxxxx"

# Option A (local) : chemin vers le JSON du compte de service Google.
GOOGLE_APPLICATION_CREDENTIALS = "/chemin/local/vers/service_account.json"

# Option B (Streamlit Cloud, pas de fichier) : colle le JSON du compte de service
# sous forme de table, et adapte sheets.py pour lire st.secrets
# (Credentials.from_service_account_info).
# [gcp_service_account]
# type = "service_account"
# project_id = "..."
# private_key_id = "..."
# private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
# client_email = "agence-location@xxx.iam.gserviceaccount.com"
